<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Streepjeslijst</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --accent: #4f8ef7;
      --accent-dim: #2a4a8a;
      --danger: #e74c3c;
      --danger-dim: #6b1e18;
      --success: #2ecc71;
      --text: #e8eaf0;
      --text-muted: #7a7f9a;
      --border: #2e3248;
      --radius: 14px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding-bottom: 2rem;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.25rem;
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent); }

    .price-badge {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 0.35rem 0.75rem;
      white-space: nowrap;
    }

    .price-badge .label { font-size: 0.7rem; color: var(--text-muted); }
    .price-badge .value { font-size: 0.95rem; font-weight: 700; color: var(--accent); }

    /* Hamburger */
    .hamburger {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.4rem 0.55rem;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: border-color 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .hamburger:hover { border-color: var(--accent); color: var(--accent); }
    .hamburger.open { border-color: var(--accent); color: var(--accent); }
    .hamburger span {
      display: block;
      width: 18px;
      height: 2px;
      background: currentColor;
      border-radius: 2px;
      transition: transform 0.2s, opacity 0.2s;
      transform-origin: center;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

    /* Dropdown menu */
    .nav-menu {
      position: absolute;
      top: calc(100% + 0.5rem);
      right: 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-width: 180px;
      overflow: hidden;
      z-index: 20;
      opacity: 0;
      transform: translateY(-8px) scale(0.97);
      pointer-events: none;
      transition: opacity 0.15s, transform 0.15s;
    }
    .nav-menu.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: all;
    }
    .nav-menu a {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.85rem 1.1rem;
      color: var(--text);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: background 0.12s;
      border-bottom: 1px solid var(--border);
    }
    .nav-menu a:last-child { border-bottom: none; }
    .nav-menu a:hover { background: var(--surface2); color: var(--accent); }
    .nav-menu a .nav-icon { font-size: 1rem; width: 1.2rem; text-align: center; }

    .container { max-width: 540px; margin: 0 auto; padding: 1.25rem; }

    .person-list { display: flex; flex-direction: column; gap: 0.75rem; }

    .person-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      box-shadow: var(--shadow);
      transition: border-color 0.15s;
    }

    .person-card:hover { border-color: var(--accent-dim); }
    .person-card.pinned {
      border-color: var(--accent);
      background: linear-gradient(135deg, var(--surface) 0%, #1e2540 100%);
    }

    /* Search */
    .search-wrap {
      position: relative;
      margin-bottom: 1rem;
    }
    .search-wrap .search-icon {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.95rem;
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem 0.75rem 2.5rem;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: var(--accent); }

    /* Pin button */
    .pin-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      opacity: 0.3;
      padding: 0.2rem;
      transition: opacity 0.15s, transform 0.15s;
      line-height: 1;
      flex-shrink: 0;
    }
    .pin-btn:hover { opacity: 0.7; transform: rotate(-30deg); }
    .person-card.pinned .pin-btn { opacity: 1; transform: rotate(-30deg); }

    .person-name {
      flex: 1;
      font-weight: 600;
      font-size: 1.05rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tally-controls { display: flex; align-items: center; gap: 0.5rem; }

    .tally-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      font-size: 1.5rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s, transform 0.1s;
    }

    .tally-btn:active { transform: scale(0.88); }
    .tally-btn.minus { background: var(--danger-dim); color: var(--danger); }
    .tally-btn.minus:hover { background: var(--danger); color: #fff; }
    .tally-btn.plus { background: var(--accent-dim); color: var(--accent); }
    .tally-btn.plus:hover { background: var(--accent); color: #fff; }
    .tally-btn:disabled { opacity: 0.3; cursor: default; }

    .tally-count { min-width: 2.2rem; text-align: center; font-size: 1.3rem; font-weight: 700; }

    .person-cost { min-width: 4rem; text-align: right; font-size: 0.95rem; font-weight: 600; color: var(--success); }

    .pay-btn {
      background: #d4370a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.45rem 0.75rem;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.3px;
    }
    .pay-btn:hover { opacity: 0.85; }
    .pay-btn:active { transform: scale(0.94); }
    .pay-btn:disabled { opacity: 0.4; cursor: default; }
    .pay-btn.pending { background: var(--text-muted); }

    .summary {
      margin-top: 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .summary-label { color: var(--text-muted); font-size: 0.9rem; }
    .summary-total { font-size: 1.5rem; font-weight: 800; color: var(--accent); }

    .undo-fab {
      position: fixed;
      bottom: 1.75rem;
      right: 1.25rem;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      color: var(--text);
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, transform 0.15s, background 0.15s;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transform: scale(0.8);
    }
    .undo-fab.visible { opacity: 1; pointer-events: all; transform: scale(1); }
    .undo-fab:hover { background: var(--accent-dim); border-color: var(--accent); }
    .undo-fab:active { transform: scale(0.9); }

    .empty {
      text-align: center;
      color: var(--text-muted);
      padding: 3rem 1rem;
      font-size: 0.95rem;
    }
    .empty .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .empty a { color: var(--accent); }

    .add-self {
      display: flex;
      gap: 0.6rem;
      margin-top: 1.25rem;
    }

    .add-self input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
      min-width: 0;
    }
    .add-self input::placeholder { color: var(--text-muted); }
    .add-self input:focus { border-color: var(--accent); }

    .add-self button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 0.75rem 1.1rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s, transform 0.1s;
    }
    .add-self button:hover { opacity: 0.85; }
    .add-self button:active { transform: scale(0.95); }

    .add-self-error {
      font-size: 0.8rem;
      color: var(--danger);
      margin-top: 0.4rem;
      min-height: 1rem;
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(4rem);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 0.6rem 1.2rem;
      font-size: 0.9rem;
      color: var(--text);
      box-shadow: var(--shadow);
      transition: transform 0.25s;
      z-index: 200;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <h1>Streepjes<span>lijst</span></h1>
  <div style="display:flex;align-items:center;gap:0.6rem">
    <div class="price-badge">
      <span class="label">per consumptie</span>
      <span class="value" id="priceDisplay">…</span>
    </div>
    <button class="hamburger" id="hamburgerBtn" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
  <nav class="nav-menu" id="navMenu">
    <a href="/export.html" target="_blank"><span class="nav-icon">🖨️</span> Exporteren</a>
    <a href="/admin.html"><span class="nav-icon">⚙️</span> Admin</a>
  </nav>
</header>

<div class="container">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="search" id="searchInput" placeholder="Zoek een naam…" autocomplete="off" />
  </div>
  <div class="person-list" id="personList">
    <div class="empty"><div class="icon">⏳</div>Laden…</div>
  </div>

  <form class="add-self" id="addSelfForm">
    <input type="text" id="addSelfInput" placeholder="Jouw naam toevoegen…" autocomplete="off" maxlength="30" />
    <button type="submit">+ Voeg toe</button>
  </form>
  <div class="add-self-error" id="addSelfError"></div>

  <div id="summarySection" style="display:none">
    <div class="summary">
      <div>
        <div class="summary-label">Totaal consumpties</div>
        <div id="totalDrinks" style="font-size:1.1rem;font-weight:700;margin-top:0.2rem">0</div>
      </div>
      <div style="text-align:right">
        <div class="summary-label">Totaal bedrag</div>
        <div class="summary-total" id="totalAmount">€0,00</div>
      </div>
    </div>
  </div>
</div>

<button class="undo-fab" id="undoBtn" title="Ongedaan maken">↩</button>
<div class="toast" id="toast"></div>

<script>
  let state = { price: 0, persons: [] };
  const undoStack = []; // [{ id, reverseDelta }]

  const fmt = n => '€' + n.toFixed(2).replace('.', ',');
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  // --- Pin (per device via localStorage) ---
  const PIN_KEY = 'streepjeslijst_pinned';
  let pinnedId = localStorage.getItem(PIN_KEY) ? parseInt(localStorage.getItem(PIN_KEY)) : null;

  function setPinned(id) {
    if (pinnedId === id) {
      pinnedId = null;
      localStorage.removeItem(PIN_KEY);
    } else {
      pinnedId = id;
      localStorage.setItem(PIN_KEY, String(id));
    }
    render();
  }

  // --- Search & fuzzy match ---
  let searchQuery = '';

  function normalize(s) {
    return s.toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9 ]/g, '');
  }

  function fuzzyMatch(needle, haystack) {
    const n = normalize(needle);
    const h = normalize(haystack);
    if (!n) return true;
    if (h.includes(n)) return true;
    if (n.length < 2) return false;
    // tolerate 1 missing/wrong character
    for (let i = 0; i < n.length; i++) {
      if (h.includes(n.slice(0, i) + n.slice(i + 1))) return true;
    }
    for (let i = 0; i <= h.length - n.length; i++) {
      let diffs = 0;
      for (let j = 0; j < n.length; j++) {
        if (h[i + j] !== n[j] && ++diffs > 1) break;
      }
      if (diffs <= 1) return true;
    }
    return false;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  function syncUndoBtn() {
    document.getElementById('undoBtn').classList.toggle('visible', undoStack.length > 0);
  }

  async function api(method, path, body) {
    const r = await fetch(path, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : undefined
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  }

  async function loadMollieFlag() {
    const mk = await api('GET', '/api/mollie-key');
    state.mollieConfigured = mk.configured;
  }

  function connectSSE() {
    const es = new EventSource('/api/events');
    es.onmessage = e => {
      const incoming = JSON.parse(e.data);
      state = { ...incoming, mollieConfigured: state.mollieConfigured ?? false };
      render();
    };
    es.onerror = () => {
      es.close();
      setTimeout(connectSSE, 3000); // reconnect after 3s
    };
  }

  function render() {
    document.getElementById('priceDisplay').textContent = fmt(state.price);
    const list = document.getElementById('personList');
    const summary = document.getElementById('summarySection');

    if (!state.persons.length) {
      list.innerHTML = `<div class="empty"><div class="icon">🍺</div>Geen namen op de lijst.<br><a href="/admin.html">Voeg namen toe via Admin</a>.</div>`;
      summary.style.display = 'none';
      return;
    }

    // Sort: pinned first, then alphabetical
    const sorted = [...state.persons].sort((a, b) => {
      if (a.id === pinnedId) return -1;
      if (b.id === pinnedId) return 1;
      return a.name.localeCompare(b.name, 'nl');
    });

    // Filter by search query
    const filtered = searchQuery ? sorted.filter(p => fuzzyMatch(searchQuery, p.name)) : sorted;

    if (!filtered.length) {
      list.innerHTML = `<div class="empty" style="padding:1.5rem">Geen resultaten voor "<strong>${esc(searchQuery)}</strong>"</div>`;
      summary.style.display = 'block';
    } else {
      list.innerHTML = filtered.map(p => {
        const pinned = p.id === pinnedId;
        const hasPending = p.payment && p.payment.status !== 'paid';
        const payBtn = p.count > 0 && state.mollieConfigured
          ? `<button class="pay-btn ${hasPending ? 'pending' : ''}" data-id="${p.id}" data-action="pay" ${hasPending ? 'disabled title="Betaling loopt…"' : ''}>
              ${hasPending ? '⏳ Bezig…' : 'iDEAL ' + fmt(p.count * state.price)}
             </button>`
          : '';
        return `
        <div class="person-card ${pinned ? 'pinned' : ''}">
          <button class="pin-btn" data-action="pin" data-id="${p.id}" title="${pinned ? 'Losmaken' : 'Vastzetten'}">📌</button>
          <span class="person-name">${esc(p.name)}</span>
          <div class="tally-controls">
            <button class="tally-btn minus" data-id="${p.id}" data-action="dec" ${p.count === 0 ? 'disabled' : ''}>−</button>
            <span class="tally-count">${p.count}</span>
            <button class="tally-btn plus" data-id="${p.id}" data-action="inc">+</button>
          </div>
          <span class="person-cost">${fmt(p.count * state.price)}</span>
          ${payBtn}
        </div>`;
      }).join('');
    }

    const drinks = state.persons.reduce((s, p) => s + p.count, 0);
    document.getElementById('totalDrinks').textContent = drinks + (drinks === 1 ? ' consumptie' : ' consumpties');
    document.getElementById('totalAmount').textContent = fmt(drinks * state.price);
    summary.style.display = 'block';
  }

  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value.trim();
    render();
  });

  document.getElementById('personList').addEventListener('click', async e => {
    const btn = e.target.closest('[data-action]');
    if (!btn || btn.disabled) return;
    const id = parseInt(btn.dataset.id);
    if (btn.dataset.action === 'pin') { setPinned(id); return; }
    const delta = btn.dataset.action === 'inc' ? 1 : -1;
    try {
      const updated = await api('PATCH', `/api/persons/${id}`, { delta });
      const p = state.persons.find(x => x.id === id);
      if (p) {
        if (updated.count !== p.count) {
          undoStack.push({ id, reverseDelta: -delta });
          syncUndoBtn();
        }
        p.count = updated.count;
        render();
      }
    } catch {}
  });

  document.getElementById('personList').addEventListener('click', async e => {
    const btn = e.target.closest('[data-action="pay"]');
    if (!btn || btn.disabled) return;
    btn.disabled = true;
    btn.textContent = 'Laden…';
    try {
      const { checkoutUrl, paymentId } = await api('POST', '/api/payments', { personId: btn.dataset.id });
      // Store paymentId so return page can use it
      sessionStorage.setItem('lastPaymentId', paymentId);
      window.location.href = checkoutUrl;
    } catch (e) {
      showToast('Fout: ' + e.message);
      await loadState();
    }
  }, true); // capture so it runs before the tally handler

  document.getElementById('addSelfForm').addEventListener('submit', async e => {
    e.preventDefault();
    const input = document.getElementById('addSelfInput');
    const err = document.getElementById('addSelfError');
    const name = input.value.trim();
    if (!name) return;
    err.textContent = '';
    try {
      await api('POST', '/api/persons', { name });
      input.value = '';
      showToast(`"${name}" toegevoegd`);
    } catch (ex) {
      err.textContent = ex.message === 'Name already exists' ? 'Naam staat er al op.' : ex.message;
    }
  });

  document.getElementById('undoBtn').addEventListener('click', async () => {
    if (!undoStack.length) return;
    const { id, reverseDelta } = undoStack.pop();
    syncUndoBtn();
    try {
      const updated = await api('PATCH', `/api/persons/${id}`, { delta: reverseDelta });
      const p = state.persons.find(x => x.id == id);
      if (p) { p.count = updated.count; render(); }
      const name = state.persons.find(x => x.id == id)?.name ?? '';
      showToast(`Ongedaan: ${reverseDelta > 0 ? '+' : ''}${reverseDelta} voor ${name}`);
    } catch {
      // Re-push if failed
      undoStack.push({ id, reverseDelta });
      syncUndoBtn();
    }
  });

  // Hamburger menu
  const hamburgerBtn = document.getElementById('hamburgerBtn');
  const navMenu = document.getElementById('navMenu');

  hamburgerBtn.addEventListener('click', e => {
    e.stopPropagation();
    const open = navMenu.classList.toggle('open');
    hamburgerBtn.classList.toggle('open', open);
  });

  document.addEventListener('click', () => {
    navMenu.classList.remove('open');
    hamburgerBtn.classList.remove('open');
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      navMenu.classList.remove('open');
      hamburgerBtn.classList.remove('open');
    }
  });

  loadMollieFlag().then(connectSSE);
</script>
</body>
</html>
