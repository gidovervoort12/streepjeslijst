<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Streepjeslijst</title>
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body>

<!-- Password gate -->
<div class="pw-gate" id="pwGate">
  <div class="pw-box">
    <h2>Admin toegang</h2>
    <p>Voer het wachtwoord in om door te gaan.</p>
    <input class="pw-input" type="password" id="pwInput" placeholder="••••••••••" autocomplete="current-password" />
    <div class="pw-error" id="pwError"></div>
    <button class="pw-btn" id="pwSubmit">Inloggen</button>
  </div>
</div>

<div class="page-content" id="pageContent">
<header>
  <h1>Admin <span>— Streepjeslijst</span></h1>
  <a href="/" class="back-link">← Terug</a>
</header>

<div class="container">

  <!-- iDEAL / Mollie -->
  <div class="section" id="sec-mollie">
    <div class="section-header" data-sec="sec-mollie">
      <span class="section-title">iDEAL betalingen (Mollie)</span>
      <span class="section-chevron">▼</span>
    </div>
    <div class="section-body">
      <div class="add-row">
        <input class="input" type="password" id="mollieKeyInput" placeholder="live_… of test_…" autocomplete="off" />
        <button class="btn btn-primary" id="saveMollieKey">Opslaan</button>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:0.75rem;gap:0.75rem">
        <div class="current-price" id="mollieStatus" style="margin-top:0"></div>
        <button class="btn-danger-ghost" id="removeMollieKey" style="display:none">Verwijderen</button>
      </div>
      <div class="error-msg" id="mollieError"></div>
    </div>
  </div>

  <!-- Prijs -->
  <div class="section" id="sec-price">
    <div class="section-header" data-sec="sec-price">
      <span class="section-title">Prijs per consumptie</span>
      <span class="section-chevron">▼</span>
    </div>
    <div class="section-body">
      <div class="price-row">
        <label for="priceInput">€</label>
        <input class="input" type="number" id="priceInput" min="0" step="0.10" placeholder="2.50" />
        <button class="btn btn-primary" id="savePrice">Opslaan</button>
      </div>
      <div class="current-price">Huidige prijs: <strong id="currentPrice">…</strong></div>
      <div class="error-msg" id="priceError"></div>
    </div>
  </div>

  <!-- Namen -->
  <div class="section" id="sec-names">
    <div class="section-header" data-sec="sec-names">
      <span class="section-title">Namen beheren</span>
      <span class="section-chevron">▼</span>
    </div>
    <div class="section-body">
      <div class="add-row">
        <input class="input" type="text" id="nameInput" placeholder="Naam toevoegen…" autocomplete="off" maxlength="30" />
        <button class="btn btn-primary" id="addBtn">+ Voeg toe</button>
      </div>
      <div class="error-msg" id="nameError"></div>
      <div class="persons-table" id="personsList">
        <div class="empty-list">Laden…</div>
      </div>
    </div>
  </div>

  <!-- Geschiedenis -->
  <div class="section" id="sec-history">
    <div class="section-header" data-sec="sec-history">
      <span class="section-title">Geschiedenis (7 dagen)</span>
      <div class="section-header-right">
        <button class="btn btn-primary btn-sm" id="takeSnapshotBtn">+ Momentopname</button>
        <span class="section-chevron">▼</span>
      </div>
    </div>
    <div class="section-body">
      <div id="snapshotList"><div class="empty-list">Geen momentopnames gevonden.</div></div>
    </div>
  </div>

  <!-- Beheeracties -->
  <div class="section danger-zone" id="sec-danger">
    <div class="section-header" data-sec="sec-danger">
      <span class="section-title">Beheeracties</span>
      <span class="section-chevron">▼</span>
    </div>
    <div class="section-body">
      <div class="danger-actions">
        <button class="btn btn-danger-ghost" id="resetBtn">Alle streepjes wissen</button>
        <button class="btn btn-danger" id="clearAllBtn">Alle namen verwijderen</button>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>
</div><!-- end page-content -->

<script src="/js/admin.js"></script>
</body>
</html>
